[[mods]]
modId = "wnl_joingate"
version = "1.0.0"
displayName = "WNL Join Gate"
authors = "DegradingAnt"
description = '''When you join, respawn, or change dimension, this force-loads the chunks around where you actually land, so the area is solid and meshed straight away instead of building in around you.

Vanilla's "Preparing spawn area" only loads chunks around world spawn at 0,0, which doesn't help when you log into an existing save far from there, so nothing makes your landing chunks render-ready until your own view-distance tickets slowly catch up. This front-loads them with a self-expiring chunk ticket that's removed after a few seconds. It is never persisted and never blocks login.

Server-side and event-driven (PlayerLoggedIn, Respawn, ChangedDimension), with no jar edits or mixins. Configure or disable it in config/wnl_joingate.properties. Delete the jar to remove it. Add-on to WNL PackFixes.'''

[[dependencies."wnl_joingate"]]
