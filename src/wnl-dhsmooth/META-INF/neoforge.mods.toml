[[mods]]
modId = "wnl_dhsmooth"
version = "1.1.0"
displayName = "WNL DH LOD Smoothing"
authors = "DegradingAnt"
description = '''A client-side fix for the periodic frame-spike freezes Distant Horizons can cause. DH uploads its LOD render buffers in the background, and when a batch finishes, the very next frame has to draw all that new geometry at once. On a GPU already busy pushing DH through shaders, that single frame lands as a multi-hundred-millisecond hitch. This caps how many newly-finished buffers get added to the draw list each frame (in RenderBufferHandler.buildRenderList), so a batch fades in over a few frames instead of all at once. Terrain that's already on screen is never held back, and deferred buffers are retried every following frame, so distant LODs just appear a frame or two later, which you won't notice at that range. Same final image, no graphics settings changed. Configure or disable it in config/wnl_dhsmooth.properties. Client-only, and it quietly does nothing if DH's internals move. Delete the jar to remove it. Add-on to WNL PackFixes.'''

[[mixins]]
config = "wnl_dhsmooth.mixins.json"

[[dependencies."wnl_dhsmooth"]]
modId = "neoforge"
type = "required"
versionRange = "[21,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies."wnl_dhsmooth"]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "CLIENT"

[[dependencies."wnl_dhsmooth"]]
