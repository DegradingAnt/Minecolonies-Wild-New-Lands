[[mods]]
modId = "wnl_ftbchunks"
version = "1.0.0"
displayName = "WNL FTB Chunks Map-Save Offload"
authors = "DegradingAnt"
description = '''Moves FTB Chunks' MapRegionData.write() snapshot (five 512x512 BufferedImage allocations and around 1.3 million setRGB calls) off the render thread and onto FTB Chunks' own MAP_EXECUTOR background thread. That removes the render-thread spikes the periodic 60-second autosave and the pause screen used to cause. Delete the jar to remove it. Add-on to WNL PackFixes.'''

[[mixins]]
config = "wnl_ftbchunks.mixins.json"

[[dependencies."wnl_ftbchunks"]]
modId = "neoforge"
type = "required"
versionRange = "[21,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."wnl_ftbchunks"]]
